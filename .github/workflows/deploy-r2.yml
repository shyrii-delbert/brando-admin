name: Deploy To R2

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - Online
          - Staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'auto' }}
      AWS_EC2_METADATA_DISABLED: 'true'
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select deployment settings
        run: |
          if [ "${{ inputs.environment }}" = "Staging" ]; then
            echo "R2_BUCKET=${{ secrets.R2_STAGING_BUCKET }}" >> "$GITHUB_ENV"
            echo "BUILD_COMMAND=pnpm build:staging" >> "$GITHUB_ENV"
          else
            echo "R2_BUCKET=${{ secrets.R2_BUCKET }}" >> "$GITHUB_ENV"
            echo "BUILD_COMMAND=pnpm build" >> "$GITHUB_ENV"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: ${{ env.BUILD_COMMAND }}

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update

      - name: Verify AWS CLI
        run: aws --version

      - name: Upload dist to R2 root
        run: aws s3 sync dist "s3://${R2_BUCKET}" --endpoint-url "${R2_ENDPOINT}" --no-progress
